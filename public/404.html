<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Au Jour Le Jour</title>
  </head>
  <body>
    <script>
      (function redirect() {
        var path = window.location.pathname || "";
        var match = path.match(/^\/s\/([A-Za-z0-9_-]{24,128})\/?$/);
        if (match && match[1]) {
          window.location.replace("/?share=" + encodeURIComponent(match[1]));
          return;
        }
        window.location.replace("/");
      })();
    </script>
  </body>
</html>
